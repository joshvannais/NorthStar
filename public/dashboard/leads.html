<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads — NorthStar AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="/dashboard" class="sidebar-logo">
        <img src="/assets/logo.png" alt="NorthStar" class="logo-img">
        NorthStar
      </a>
      <nav class="sidebar-nav">
        <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
        <a href="/dashboard/leads" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Leads</span></a>
        <a href="/dashboard/calls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>Call History</span></a>
        <a href="/dashboard/my-number"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>My Number</span></a>
        <a href="/dashboard/settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/></svg><span>Settings</span></a>
      </nav>
      <a href="/" onclick="localStorage.clear()" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);text-decoration:none;font-size:14px;font-weight:500;color:var(--neutral-500);margin-top:auto;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg><span>Sign Out</span></a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>All Leads</h1>
          <p>Every lead captured by your AI receptionist.</p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="simulateLead()">➕ Simulate Lead</button>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h2>Leads</h2>
          <span style="font-size:13px;color:var(--neutral-500);" id="leadCount">0 leads</span>
        </div>
        <div id="leadsContent">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3>No leads yet</h3>
            <p>Leads will appear here when your AI receptionist answers calls.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/api.js"></script>
  <script>
    async function loadLeads() {
      try {
        const data = await API.getLeads();
        const leads = data.items || [];
        document.getElementById('leadCount').textContent = `${leads.length} leads`;
        renderLeads(leads);
      } catch (err) {
        console.error(err);
      }
    }

    function renderLeads(leads) {
      if (leads.length === 0) {
        document.getElementById('leadsContent').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3>No leads yet</h3>
            <p>Leads will appear here when your AI receptionist answers calls.</p>
          </div>`;
        return;
      }

      let html = `<table><thead><tr>
        <th>Customer</th><th>Phone</th><th>Address</th><th>Service</th><th>Preferred Time</th><th>Date</th><th>Status</th>
      </tr></thead><tbody>`;

      leads.slice().reverse().forEach(lead => {
        html += `<tr>
          <td><strong>${lead.customerName || 'Unknown'}</strong></td>
          <td>${lead.phoneNumber || '-'}</td>
          <td>${lead.address || '-'}</td>
          <td>${lead.serviceRequested || '-'}</td>
          <td>${lead.preferredTime || '-'}</td>
          <td>${lead.receivedAt ? formatDate(lead.receivedAt) : '-'}</td>
          <td>${getStatusBadge(lead.status || 'new')}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('leadsContent').innerHTML = html;
    }

    async function simulateLead() {
      try {
        const result = await API.simulateLead({
          customerName: 'Demo Caller',
          phoneNumber: '(555) 000-0000',
          address: '123 Demo Street',
          serviceRequested: 'Test service',
          preferredTime: 'Next available',
        });
        showToast('✅ Lead captured!');
        loadLeads();
      } catch (err) {
        showToast('Lead simulated', 'success');
        loadLeads();
      }
    }

    loadLeads();
  </script>
</body>
</html>
