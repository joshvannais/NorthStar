<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Details — NorthStar Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lead-detail-container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .lead-detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .lead-detail-title { font-size: 24px; font-weight: 700; color: var(--neutral-900); }
    .lead-detail-subtitle { font-size: 14px; color: var(--neutral-500); margin-top: 4px; }
    .lead-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .lead-detail-card { background: var(--neutral-50); border: 1px solid var(--neutral-200); border-radius: var(--radius); padding: 16px; }
    .lead-detail-card h3 { font-size: 13px; font-weight: 600; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .lead-detail-card .value { font-size: 16px; font-weight: 600; color: var(--neutral-900); }
    .lead-detail-card .value-secondary { font-size: 14px; color: var(--neutral-600); margin-top: 2px; }
    .lead-detail-section { margin-bottom: 24px; }
    .lead-detail-section h2 { font-size: 16px; font-weight: 600; color: var(--neutral-900); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--neutral-200); }
    .lead-detail-pre { white-space: pre-wrap; max-height: 320px; overflow-y: auto; font: inherit; line-height: 1.6; margin: 0; }
    .lead-detail-state { text-align: center; padding: 60px 20px; color: var(--neutral-400); }
    .lead-detail-state-icon { font-size: 32px; margin-bottom: 12px; }
    .lead-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 640px) {
      .lead-detail-grid { grid-template-columns: 1fr; }
      .lead-detail-container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <div class="lead-detail-container" id="leadDetailContainer" aria-live="polite">
        <div class="lead-detail-state" id="loadingState" data-lead-state="loading">
          <div class="lead-detail-state-icon" aria-hidden="true">⏳</div>
          <div>Loading lead details...</div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/js/demo-session.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/status-pill.js"></script>
  <script src="/js/customer-card.js"></script>
  <script src="/js/polaris-ui.js"></script>
  <script src="/js/nav-component.js"></script>
  <script src="/js/lead-detail.js"></script>
</body>
</html>
