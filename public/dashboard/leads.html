    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>All Leads</h1>
          <p>Every lead captured by your AI receptionist.</p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="simulateLead()">➕ Simulate Lead</button>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h2>Leads</h2>
          <span style="font-size:13px;color:var(--neutral-500);" id="leadCount">0 leads</span>
        </div>
        <div id="leadsContent">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
<script src="/js/api.js"></script>

  <script>
    // In-memory leads — resets on each page load
    let allLeads = [];

    // First, grab anything synced from the dashboard via sessionStorage
    try {
      const synced = sessionStorage.getItem('northstar_calls');
      if (synced) {
        const parsed = JSON.parse(synced);
        if (Array.isArray(parsed)) allLeads = parsed;
        sessionStorage.removeItem('northstar_calls');
      }
    } catch(e) {}

    function loadLeads() {
      document.getElementById('leadCount').textContent = `${allLeads.length} leads`;
      renderLeads(allLeads);
    }

    function renderLeads(leads) {
      if (leads.length === 0) {
        document.getElementById('leadsContent').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3>No leads yet</h3>
            <p>Leads will appear here when your AI receptionist answers calls.</p>
          </div>`;
        return;
      }

      let html = `<table><thead><tr>
        <th>Customer</th><th>Phone</th><th>Address</th><th>Service</th><th>Date</th><th>Status</th>
      </tr></thead><tbody>`;

      leads.slice().reverse().forEach(c => {
        const status = c.status || 'new';
        html += `<tr>
          <td><strong>${c.caller || c.customerName || 'Unknown'}</strong></td>
          <td>${c.phone || c.phoneNumber || '-'}</td>
          <td>${c.address || '-'}</td>
          <td>${c.service || c.serviceRequested || '-'}</td>
          <td>${c.time || (c.receivedAt ? formatDate(c.receivedAt) : '-')}</td>
          <td>${getStatusBadge(status)}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('leadsContent').innerHTML = html;
    }

    function simulateLead() {
      const names = ['John Smith', 'Maria Garcia', 'Bob Johnson', 'Sarah Wilson', 'Mike Brown', 'Lisa Davis'];
      const services = ['Tree removal', 'Roof repair', 'Plumbing leak', 'Electrical wiring', 'Landscape design', 'Deck staining'];
      const addresses = ['123 Oak St', '456 Maple Ave', '789 Pine Rd', '321 Elm Dr', '654 Birch Ln'];
      const name = names[Math.floor(Math.random() * names.length)];
      const service = services[Math.floor(Math.random() * services.length)];
      const address = addresses[Math.floor(Math.random() * addresses.length)];
      const phone = `(${100+Math.floor(Math.random()*900)}) ${100+Math.floor(Math.random()*900)}-${1000+Math.floor(Math.random()*9000)}`;

      const lead = {
        caller: name,
        phone: phone,
        address: address,
        service: service,
        time: new Date().toLocaleString(),
        status: 'new',
        avgPrice: 0
      };

      allLeads.unshift(lead);
      try {
        const existing = JSON.parse(sessionStorage.getItem('northstar_calls') || '[]');
        existing.unshift(lead);
        sessionStorage.setItem('northstar_calls', JSON.stringify(existing));
      } catch(e) {}
      showToast(`✅ New lead: ${name} (${service})`);
      loadLeads();
    }

    loadLeads();
  </script>
<script src="/js/theme.js"></script>
