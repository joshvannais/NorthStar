<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Details — NorthStar Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lead-detail-container { max-width: 960px; margin: 0 auto; padding: 24px; }
    .lead-detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .lead-detail-title { font-size: 24px; font-weight: 700; color: var(--neutral-900); }
    .lead-detail-subtitle { font-size: 14px; color: var(--neutral-500); margin-top: 4px; }
    .lead-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 640px) { .lead-detail-grid { grid-template-columns: 1fr; } }
    .lead-detail-card { background: var(--neutral-50); border: 1px solid var(--neutral-200); border-radius: var(--radius); padding: 16px; }
    .lead-detail-card h3 { font-size: 13px; font-weight: 600; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .lead-detail-card .value { font-size: 16px; font-weight: 600; color: var(--neutral-900); }
    .lead-detail-card .value-secondary { font-size: 14px; color: var(--neutral-600); margin-top: 2px; }
    .lead-detail-section { margin-bottom: 24px; }
    .lead-detail-section h2 { font-size: 16px; font-weight: 600; color: var(--neutral-900); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--neutral-200); }
    .lead-timeline { list-style: none; padding: 0; }
    .lead-timeline li { padding: 8px 0; border-bottom: 1px solid var(--neutral-100); display: flex; gap: 8px; font-size: 14px; }
    .lead-timeline .time { color: var(--neutral-400); font-size: 12px; white-space: nowrap; min-width: 80px; }
    .lead-timeline .event { color: var(--neutral-700); }
    .lead-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 768px) { .lead-detail-container { padding: 16px; } }
  </style>
</head>

        var url = new URL(window.location.href);

        var leadId = getQueryParam('id');
        if (!leadId) {
          document.getElementById('loadingState').innerHTML = '<div style="font-size:32px;margin-bottom:12px;">🔍</div><div>No lead ID specified. <a href="/dashboard/leads" style="color:var(--brand-600);">Back to leads</a></div>';
          return;
        }

        // Try AppStore first, then API
        var lead = (typeof AppStore !== 'undefined' && AppStore.getLead) ? AppStore.getLead(leadId) : null;

        if (lead) {
          renderLead(lead);
        } else if (typeof API !== 'undefined' && API.getLead) {
          API.getLead(leadId).then(function(data) {
            renderLead(data);
          }).catch(function() {
            document.getElementById('loadingState').innerHTML = '<div style="font-size:32px;margin-bottom:12px;">😕</div><div>Lead not found. <a href="/dashboard/leads" style="color:var(--brand-600);">Back to leads</a></div>';
          });

              (j.phase && j.phase !== 'unknown' ? '<div><span style="font-size:11px;color:var(--neutral-500);">Phase</span><div class="value" style="font-size:14px;text-transform:capitalize;">' + j.phase + '</div></div>' : '') +
              (j.openIssues > 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Open Issues</span><div class="value" style="font-size:14px;color:#991b1b;">' + j.openIssues + '</div></div>' : '') +
              (j.scheduleVariance && j.scheduleVariance.varianceDays !== undefined ? '<div><span style="font-size:11px;color:var(--neutral-500);">Schedule</span><div class="value" style="font-size:14px;' + (j.scheduleVariance.varianceDays > 0 ? 'color:#991b1b;' : 'color:#166534;') + '">' + (j.scheduleVariance.varianceDays > 0 ? '+' : '') + j.scheduleVariance.varianceDays + ' days</div></div>' : '') +
              (j.delayCount > 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Delays</span><div class="value" style="font-size:14px;">' + j.delayCount + '</div></div>' : '') +
              '</div></div>';
          }
          // M13 Intelligence - Crew Operations Insights
          if (pa.m13Intelligence && pa.m13Intelligence.crew) {
            var cr = pa.m13Intelligence.crew;
            polarisHtml += '<div class="lead-detail-card" style="margin-top:8px;">' +
              '<h3 style="font-size:13px;">Crew Operations Intelligence</h3>' +
              '<div style="display:flex;gap:12px;flex-wrap:wrap;">' +
              (cr.name ? '<div><span style="font-size:11px;color:var(--neutral-500);">Crew</span><div class="value" style="font-size:14px;">' + cr.name + '</div></div>' : '') +
              (cr.status ? '<div><span style="font-size:11px;color:var(--neutral-500);">Status</span><div class="value" style="font-size:14px;text-transform:capitalize;">' + cr.status + '</div></div>' : '') +
              (cr.memberCount ? '<div><span style="font-size:11px;color:var(--neutral-500);">Members</span><div class="value" style="font-size:14px;">' + cr.memberCount + '</div></div>' : '') +
              (cr.efficiency ? '<div><span style="font-size:11px;color:var(--neutral-500);">Efficiency</span><div class="value" style="font-size:14px;">' + cr.efficiency + '%</div></div>' : '') +
              '</div></div>';
          }
          // M13 Intelligence - Workflow & Tasks Insights
          if (pa.m13Intelligence && pa.m13Intelligence.workflow) {
            var w = pa.m13Intelligence.workflow;
            var wfWarnStyle = w.overdueTasks > 0 ? 'color:#991b1b;' : '';
            polarisHtml += '<div class="lead-detail-card" style="margin-top:8px;">' +
              '<h3 style="font-size:13px;">Workflow & Task Intelligence</h3>' +
              '<div style="display:flex;gap:12px;flex-wrap:wrap;">' +
              (w.totalTasks >= 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Tasks</span><div class="value" style="font-size:14px;">' + w.totalTasks + '</div></div>' : '') +
              (w.completedTasks >= 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Completed</span><div class="value" style="font-size:14px;color:#166534;">' + w.completedTasks + '</div></div>' : '') +
              (w.pendingTasks >= 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Pending</span><div class="value" style="font-size:14px;">' + w.pendingTasks + '</div></div>' : '') +
              (w.overdueTasks > 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Overdue</span><div class="value" style="font-size:14px;color:#991b1b;">' + w.overdueTasks + '</div></div>' : '') +
              (w.completionRate >= 0 ? '<div><span style="font-size:11px;color:var(--neutral-500);">Completion</span><div class="value" style="font-size:14px;' + wfWarnStyle + '">' + w.completionRate + '%</div></div>' : '') +
              '</div></div>';
          }
          // M13 Intelligence - Asset Intelligence
          if (pa.m13Intelligence && pa.m13Intelligence.assets && pa.m13Intelligence.assets.length > 0) {
            var astRows = '';
            for (var ai = 0; ai < pa.m13Intelligence.assets.length; ai++) {
              var a = pa.m13Intelligence.assets[ai];
              astRows += '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid var(--neutral-100);">' +
                '<span>' + a.name + '</span>' +
                '<span style="text-transform:capitalize;">' + a.status + ' (' + Math.round(a.utilization) + '%)</span></div>';
            }
            polarisHtml += '<div class="lead-detail-card" style="margin-top:8px;">' +
              '<h3 style="font-size:13px;">Asset Intelligence</h3>' +
              astRows +
              '</div>';
          }
        } else {
          polarisHtml = '<div class="lead-detail-card"><h3>POLARIS™ Revenue Intelligence</h3><div class="value-secondary">Run analysis to see estimated pricing and recommendations.</div></div>';
        }

        // Generate estimate using M13 intelligence (async), fall back to client-side
        function runPolarisEstimate() {
          if (!lead.polarisEstimate && typeof PolarisEngine !== 'undefined') {
            if (PolarisEngine.fetchM13Intelligence) {
              PolarisEngine.fetchM13Intelligence(lead).then(function(est) {
                // Also fetch M13 bridge intelligence (customer + comms)
                if (typeof PolarisM13Bridge !== 'undefined' && PolarisM13Bridge.augmentLead) {
                  PolarisM13Bridge.augmentLead(lead).then(function() {
                    if (document.getElementById('leadDetailContainer')) {
                      renderLeadDetail(lead);
                    }
                  });
                } else {
                  if (est && document.getElementById('leadDetailContainer')) {
                    renderLeadDetail(lead);
                  }
                }
              });
            } else if (PolarisEngine.generateEstimate) {
              try { PolarisEngine.generateEstimate(lead); } catch(e) {}
            }
          }
        }
        runPolarisEstimate();

        container.innerHTML = '' +
          '<div class="lead-detail-header">' +
            '<div>' +
              '<div class="lead-detail-title">' + name + ' ' + statusBadge + '</div>' +
              '<div class="lead-detail-subtitle">' + service + ' · ' + price + ' · ' + phone + '</div>' +
            '</div>' +
            '<div class="lead-actions">' +
              '<a href="/dashboard/leads" class="btn btn-secondary btn-sm">← Back to Leads</a>' +
              '<button class="btn btn-primary btn-sm" onclick="window.location.href=\'/dashboard/communications\'">📞 Contact</button>' +
            '</div>' +
          '</div>' +

          '<div class="lead-detail-grid">' +
            '<div class="lead-detail-card"><h3>Status</h3><div class="value">' + statusBadge + '</div></div>' +
            '<div class="lead-detail-card"><h3>Service</h3><div class="value">' + service + '</div><div class="value-secondary">' + (lead.jobDetail || '') + '</div></div>' +
            '<div class="lead-detail-card"><h3>Estimated Value</h3><div class="value" style="color:var(--brand-600);">' + price + '</div></div>' +
            '<div class="lead-detail-card"><h3>Outcome</h3><div class="value" style="text-transform:capitalize;">' + outcome + '</div></div>' +
            '<div class="lead-detail-card"><h3>Phone</h3><div class="value">' + phone + '</div></div>' +
            '<div class="lead-detail-card"><h3>Address</h3><div class="value">' + address + '</div></div>' +
            '<div class="lead-detail-card"><h3>Duration</h3><div class="value">' + duration + '</div></div>' +
            '<div class="lead-detail-card"><h3>Lead ID</h3><div class="value" style="font-size:13px;font-family:monospace;">' + (lead.id || '—') + '</div></div>' +
            '<div class="lead-detail-card"><h3>Received</h3><div class="value">' + receivedAt + '</div></div>' +
            '<div class="lead-detail-card"><h3>Last Updated</h3><div class="value">' + updatedAt + '</div></div>' +
          '</div>' +

          '<div class="lead-detail-section">' +
            '<h2>POLARIS™ Analysis</h2>' +
            polarisHtml +
          '</div>' +

          renderEstimatePanel(lead.polarisEstimate) + '\n' +
          (summary ? '<div class="lead-detail-section"><h2>Summary</h2><div class="lead-detail-card"><div class="value-secondary">' + summary + '</div></div></div>' : '') +

          (transcript ? '<div class="lead-detail-section"><h2>Transcript</h2><div class="lead-detail-card"><div class="value-secondary" style="white-space:pre-wrap;max-height:300px;overflow-y:auto;font-size:13px;line-height:1.6;">' + transcript + '</div></div></div>' : '') +

          '<div class="lead-detail-section">' +
            '<h2>Activity</h2>' +
            '<div class="lead-detail-card">' +
              '<ul class="lead-timeline">' +
                '<li><span class="time">' + receivedAt + '</span><span class="event">Lead created</span></li>' +
                (lead.updatedAt ? '<li><span class="time">' + updatedAt + '</span><span class="event">Lead updated</span></li>' : '') +
              '</ul>' +
            '</div>' +
          '</div>';
      }


  function renderEstimatePanel(estimate) {
    if (!estimate || !estimate.items) {
      return '<div class="lead-detail-section" id="estimateSection">' +
        '<h2>Line-Item Estimate</h2>' +
        '<div class="lead-detail-card">' +
        '<div style="text-align:center;padding:20px;color:var(--neutral-400);">' +
        'Not enough data for a detailed estimate. Add service type, description, and address.' +
        '</div></div></div>';
    }

    var itemRows = estimate.items.map(function(item) {
      var typeLabel = item.type.charAt(0).toUpperCase() + item.type.slice(1);
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--neutral-100);font-size:13px;">' +
        '<div><span style="font-weight:500;">' + typeLabel + '</span>' +
        (item.description ? '<div style="font-size:11px;color:var(--neutral-500);">' + item.description + '</div>' : '') +
        '</div>' +
        '<div style="font-weight:500;white-space:nowrap;">$' + item.amount.toFixed(2) + '</div>' +
        '</div>';
    }).join('');

    var upsellRows = '';
    if (estimate.upsells && estimate.upsells.length > 0) {
      upsellRows = '<div style="margin-top:12px;padding-top:8px;border-top:2px solid var(--brand-100);">' +
        '<div style="font-size:12px;font-weight:600;color:var(--brand-600);margin-bottom:6px;">Recommended Add-ons</div>';
      estimate.upsells.forEach(function(u) {
        upsellRows += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;">' +
          '<div><span>' + u.label + '</span><div style="font-size:11px;color:var(--neutral-500);">' + u.description + '</div></div>' +
          '<span style="font-weight:500;">$' + u.amount.toFixed(2) + '</span></div>';
      });
      upsellRows += '</div>';
    }

    var totalRow = '<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:4px;border-top:2px solid var(--neutral-300);font-size:16px;font-weight:700;">' +
      '<span>Total</span><span style="color:var(--brand-600);">$' + estimate.total.toFixed(2) + '</span></div>';

    var confClass = estimate.confidenceLabel ? estimate.confidenceLabel.toLowerCase() : 'low';
    var badgeStyle = confClass === 'high' ? 'background:#dcfce7;color:#166534;' : 
                     confClass === 'medium' ? 'background:#fef3c7;color:#92400e;' :
                     'background:#fee2e2;color:#991b1b;';

    return '<div class="lead-detail-section" id="estimateSection">' +
      '<h2>Line-Item Estimate</h2>' +
      '<div class="lead-detail-card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
      '<div><span style="font-size:13px;font-weight:500;">' + estimate.service + '</span>' +
      '<span style="font-size:11px;color:var(--neutral-500);margin-left:8px;">' + estimate.difficultyLabel + '</span></div>' +
      '<span style="font-size:11px;padding:2px 8px;border-radius:4px;' + badgeStyle + '">' +
      estimate.confidenceLabel + ' (' + estimate.confidence + '%)' +
      '</span></div>' +
      itemRows +
      totalRow +
      upsellRows +
      '<div style="margin-top:10px;padding:8px;background:var(--neutral-50);border-radius:4px;font-size:11px;color:var(--neutral-600);line-height:1.5;">' +
      '<strong>AI Reasoning:</strong> ' + estimate.reasoning +
      '</div>' +
      '</div></div>';
  }

      // renderLeadDetail — re-renders the lead after M13 intelligence is augmented
      function renderLeadDetail(lead) {
        if (lead && document.getElementById('leadDetailContainer')) {
          renderLead(lead);
        }
      }

      // Load on DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadLead);
      } else {
        loadLead();
      }
    })();
  </script>
</body>
</html>
