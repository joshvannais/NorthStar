          stroke="#000000" stroke-width="4" stroke-linejoin="round" fill="none"/>
    <circle cx="50" cy="50" r="18" stroke="#000000" stroke-width="2.5" fill="none"/>
    <path d="M 50 30 L 54 46 L 66 50 L 54 54 L 50 70 L 46 54 L 34 50 L 46 46 Z" 
