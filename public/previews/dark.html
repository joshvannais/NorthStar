<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Theme Preview — NorthStar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0B0D17; color: white; }

    .hero {
      padding: 100px 16px 80px;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero-logo-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(800px, 120vw);
      height: min(800px, 120vw);
      pointer-events: none;
      z-index: 0;
      opacity: 0.10;
    }

    .hero-star {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 80px rgba(212, 175, 55, 0.25));
    }

    .hero h1,
    .hero p,
    .hero-actions {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: clamp(36px, 7vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      margin-bottom: 20px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #F2C94C, #D4AF37, #B8860B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: clamp(16px, 3vw, 20px);
      color: #94A3B8;
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 15px;
      padding: 14px 32px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #D4AF37, #C89B2C);
      color: #0B0D17;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(212, 175, 55, 0.45); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #E2E8F0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    .toggle-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 35, 55, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.25);
      padding: 12px 24px;
      border-radius: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 999;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .toggle-bar a {
      color: #94A3B8;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .toggle-bar a.active { background: rgba(212,175,55,0.2); color: #D4AF37; }
    .toggle-bar a:hover { color: white; background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-logo-bg">
      <img src="/assets/logo.png" alt="" aria-hidden="true" class="hero-star">
    </div>
    <h1>Never Miss <span>Another Customer Call</span></h1>
    <p>AI-powered virtual receptionist for home service contractors — answers every call, captures every lead, 24/7. No more lost jobs because you were on the roof.</p>
    <div class="hero-actions">
      <a href="#" class="btn btn-primary">Start 14-Day Free Trial</a>
      <a href="#" class="btn btn-secondary">How It Works</a>
    </div>
  </section>

  <div class="toggle-bar">
    <a href="/preview-dark" class="active">🌙 Dark</a>
    <a href="/preview-light">☀️ Light</a>
    <a href="/">↩ Back to site</a>
  </div>
</body>
</html>
