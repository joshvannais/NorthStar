<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("northstar-theme")||"dark")</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — NorthStar AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
<style>
/* ================================================================
   Calendar — Mockup-matched design
   One calendar, one event list, one intelligence section.
   ================================================================ */

/* Page */
body { background: var(--neutral-50); }
.cal-layout {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 24px 32px 32px;
  max-width: 1200px;
  margin: 0 auto;
}
.main-content { height: calc(100vh - 80px); overflow: auto; }

/* Header Card — floating, no outer panel */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  background: var(--neutral-100);
  border: 1px solid var(--neutral-200);
  border-radius: 10px;
}
.cal-header-left { display: flex; align-items: center; gap: 10px; }
.cal-title { font-size: 17px; font-weight: 700; color: var(--neutral-800); margin: 0; white-space: nowrap; }
.cal-nav-btns { display: flex; align-items: center; gap: 2px; }
.cal-nav-btn {
  width: 28px; height: 28px; border: 1px solid var(--neutral-200);
  border-radius: 6px; background: var(--neutral-100); color: var(--neutral-400); font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.cal-nav-btn:hover { background: var(--neutral-200); color: var(--neutral-800); }
.cal-today-btn {
  padding: 4px 10px; border: 1px solid var(--neutral-200); border-radius: 6px;
  background: var(--neutral-100); color: var(--neutral-400); font-size: 11px; font-weight: 600;
  cursor: pointer; margin-left: 4px; letter-spacing: 0.02em;
}
.cal-today-btn:hover { background: var(--neutral-200); color: var(--neutral-800); }
.cal-header-right { display: flex; align-items: center; gap: 6px; }
.cal-view-tabs { display: flex; background: var(--neutral-100); border-radius: 8px; padding: 2px; }
.cal-view-tab {
  padding: 4px 10px; border: none; border-radius: 6px; background: transparent;
  color: var(--neutral-500); font-size: 11px; font-weight: 600; cursor: pointer;
  white-space: nowrap; letter-spacing: 0.02em;
}
.cal-view-tab.active { background: var(--neutral-200); color: var(--neutral-800); }
.cal-view-tab:hover:not(.active) { color: var(--neutral-400); }

/* KPI Bar — 2x2 grid, compact, left-aligned */
.cal-kpi-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.cal-kpi-pill {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 5px;
  padding: 5px 10px;
  background: var(--neutral-100);
  border: 1px solid var(--neutral-200);
  border-radius: 8px;
  font-size: 12px;
  color: var(--neutral-400);
  white-space: nowrap;
  line-height: 1;
  min-width: 0;
  overflow: hidden;
}
.cal-kpi-pill .cal-kpi-icon {
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
}
.cal-kpi-pill .cal-kpi-num {
  font-weight: 700;
  color: var(--neutral-800);
  font-size: 12px;
  line-height: 1;
  flex-shrink: 0;
}
.cal-kpi-pill .cal-kpi-label {
  color: var(--neutral-500);
  font-size: 11px;
  font-weight: 500;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Calendar Grid */
.cal-grid-container {
  width: 100%;
  overflow: auto;
  background: var(--neutral-100);
  border: 1px solid var(--neutral-200);
  border-radius: 10px;
  padding: 16px;
  box-sizing: border-box;
}

/* Month View */
.cal-month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--neutral-100);
  border: 1px solid var(--neutral-200);
  border-radius: 8px;
  overflow: hidden;
}
.cal-month-day-header {
  background: var(--neutral-100); padding: 6px 8px; text-align: center;
  font-size: 11px; font-weight: 600; color: var(--neutral-500);
  text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid var(--neutral-200);
}
.cal-month-cell {
  background: var(--neutral-100); min-height: 80px; padding: 4px 6px;
  cursor: pointer; position: relative;
}
.cal-month-cell:hover { background: var(--neutral-200); }
.cal-month-cell-empty { background: var(--neutral-100); cursor: default; }
.cal-month-cell-today { background: rgba(99,149,255,0.06); }
.cal-month-cell-today:hover { background: rgba(99,149,255,0.10); }
.cal-month-cell-selected { outline: 1px solid #6395ff; outline-offset: -1px; z-index: 1; }
.cal-month-cell-day { font-size: 18px; font-weight: 600; color: var(--neutral-800); margin-bottom: 2px; line-height: 1.2; }
.cal-month-cell-today .cal-month-cell-day { color: #6395ff; }
.cal-month-cell-events { display: flex; flex-direction: column; gap: 3px; }
.cal-month-event-dot { width: 100%; height: 3px; border-radius: 1px; }
.cal-month-event-more { font-size: 10px; color: var(--neutral-500); font-weight: 500; }

/* Week View */
.cal-week-view { overflow: auto; }
.cal-week-grid { border: 1px solid var(--neutral-200); border-radius: 8px; overflow: hidden; }
.cal-week-row { display: grid; grid-template-columns: 50px repeat(7, 1fr); border-bottom: 1px solid var(--neutral-200); }
.cal-week-row:last-child { border-bottom: none; }
.cal-week-header { background: var(--neutral-100); }
.cal-week-day-header { padding: 6px; text-align: center; font-size: 11px; color: var(--neutral-500); border-right: 1px solid var(--neutral-200); }
.cal-week-day-header:last-child { border-right: none; }
.cal-week-day-header-today { color: #6395ff; }
.cal-week-time { padding: 6px 8px; font-size: 10px; color: var(--neutral-500); text-align: right; border-right: 1px solid var(--neutral-200); }
.cal-week-cell { min-height: 36px; padding: 1px; border-right: 1px solid var(--neutral-200); cursor: pointer; }
.cal-week-cell:last-child { border-right: none; }
.cal-week-cell:hover { background: var(--neutral-100); }
.cal-week-event { font-size: 10px; color: #fff; padding: 1px 4px; border-radius: 2px; margin-bottom: 1px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Day View */
.cal-day-view { max-width: 500px; margin: 0 auto; }
.cal-day-title { font-size: 16px; font-weight: 600; color: var(--neutral-800); margin: 0 0 12px; }
.cal-day-row { display: flex; border-bottom: 1px solid var(--neutral-200); min-height: 44px; }
.cal-day-time { width: 50px; padding: 6px 8px; font-size: 10px; color: var(--neutral-500); text-align: right; flex-shrink: 0; }
.cal-day-content { flex: 1; padding: 2px 8px; }
.cal-day-event-card { padding: 6px 10px; margin-bottom: 3px; background: var(--neutral-200); border-radius: 6px; cursor: pointer; }
.cal-day-event-card:hover { background: var(--neutral-300); }
.cal-day-event-time { font-size: 10px; color: var(--neutral-400); }
.cal-day-event-title { font-size: 13px; font-weight: 600; color: var(--neutral-800); }
.cal-day-event-desc { font-size: 11px; color: var(--neutral-500); margin-top: 2px; }

/* Agenda View */
.cal-agenda-view { max-width: 600px; margin: 0 auto; }
.cal-agenda-empty { text-align: center; padding: 60px 20px; color: var(--neutral-500); font-size: 14px; }
.cal-agenda-date { font-size: 13px; font-weight: 600; color: var(--neutral-400); padding: 10px 0 6px; border-bottom: 1px solid var(--neutral-200); margin-bottom: 6px; }
.cal-agenda-date-today { color: #6395ff; }
.cal-agenda-events { margin-bottom: 12px; }
.cal-agenda-event { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
.cal-agenda-event:hover { background: var(--neutral-100); }
.cal-agenda-event-color { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
.cal-agenda-event-info { flex: 1; }
.cal-agenda-event-title { font-size: 13px; font-weight: 600; color: var(--neutral-800); }
.cal-agenda-event-time { font-size: 11px; color: var(--neutral-400); }
.cal-agenda-event-desc { font-size: 11px; color: var(--neutral-500); margin-top: 2px; }

/* Event List — below calendar */
.cal-event-list {
  width: 100%;
  padding: 12px 16px;
  background: var(--neutral-100);
  border: 1px solid var(--neutral-200);
  border-radius: 10px;
  box-sizing: border-box;
}
.cal-event-list-header { font-size: 11px; font-weight: 700; color: var(--neutral-500); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 8px; }
.cal-event-list-empty { font-size: 12px; color: var(--neutral-500); }
.cal-event-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
}
.cal-event-list-item:hover { background: var(--neutral-100); }
.cal-event-list-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.cal-event-list-info { flex: 1; min-width: 0; }
.cal-event-list-title { font-size: 12px; font-weight: 500; color: var(--neutral-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-event-list-time { font-size: 10px; color: var(--neutral-400); }
.cal-event-list-value { font-size: 11px; font-weight: 600; color: var(--neutral-800); white-space: nowrap; }

/* New Event Button — full-width, centered */
.cal-new-event-area { margin-top: 8px; }

/* Polaris — Calendar-specific executive intelligence */
.cal-polaris-section {
  width: 100%;
  background: var(--neutral-100);
  border: 1px solid var(--neutral-200);
  border-radius: 10px;
  padding: 18px 20px;
  box-sizing: border-box;
}
.cal-polaris-badge {
  display: inline-block;
  background: #a67c00;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  border-radius: 6px;
  padding: 4px 10px;
}
.cal-polaris-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}
.cal-polaris-row + .cal-polaris-row { border-top: 1px solid var(--neutral-200); }
.cal-polaris-label { font-size: 11px; font-weight: 500; color: var(--neutral-400); flex-shrink: 0; }
.cal-polaris-value { font-size: 12px; font-weight: 600; color: var(--neutral-800); text-align: right; margin-left: 12px; }

/* Modal */
.cal-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.cal-modal { background: var(--neutral-100); border-radius: 12px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.cal-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--neutral-200); }
.cal-modal-header h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--neutral-800); }
.cal-modal-close { background: none; border: none; font-size: 20px; color: var(--neutral-500); cursor: pointer; padding: 4px; }
.cal-modal-close:hover { color: var(--neutral-400); }
.cal-modal-body { padding: 16px 18px; }
.cal-modal-field { margin-bottom: 12px; }
.cal-modal-field label { display: block; font-size: 11px; font-weight: 600; color: var(--neutral-400); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
.cal-modal-field input, .cal-modal-field textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--neutral-200); border-radius: 6px; font-size: 13px; color: var(--neutral-800); background: var(--neutral-100); box-sizing: border-box; }
.cal-modal-field input:focus, .cal-modal-field textarea:focus { outline: none; border-color: #6395ff; }
.cal-modal-row { display: flex; gap: 10px; }
.cal-modal-row .cal-modal-field { flex: 1; }
.cal-color-picker { display: flex; gap: 6px; }
.cal-color-option { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
.cal-color-option:hover { transform: scale(1.15); }
.cal-color-option.selected { border-color: var(--neutral-800); }
.cal-modal-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 10px 18px; border-top: 1px solid var(--neutral-200); }
.cal-modal-btn { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
.cal-modal-save { background: #6395ff; color: #fff; }
.cal-modal-save:hover { background: #7ba7ff; }
.cal-modal-cancel { background: var(--neutral-200); color: var(--neutral-400); }
.cal-modal-cancel:hover { background: var(--neutral-300); }
.cal-modal-delete { background: rgba(239,68,68,0.15); color: #ef4444; margin-right: auto; }
.cal-modal-delete:hover { background: rgba(239,68,68,0.25); }

/* Responsive */
@media (max-width: 768px) {
  .cal-header { flex-direction: column; align-items: stretch; gap: 8px; padding: 12px 14px; }
  .cal-header-left { justify-content: space-between; }
  .cal-header-right { width: 100%; }
  .cal-view-tabs { width: 100%; }
  .cal-view-tab { flex: 1; text-align: center; padding: 6px 4px; min-height: 44px; font-size: 12px; }
  .cal-grid-container { padding: 8px; }
  .cal-month-cell { min-height: 60px; padding: 3px 4px; }
  .cal-month-cell-day { font-size: 16px; }
  .cal-nav-btn { width: 44px; height: 44px; font-size: 20px; }
  .cal-today-btn { padding: 8px 16px; font-size: 14px; min-height: 44px; }
  .cal-title { font-size: 18px; }
  .cal-kpi-bar { gap: 4px; }
  .cal-kpi-pill { font-size: 11px; padding: 4px 8px; }
  .cal-new-event-btn { padding: 10px 16px; font-size: 14px; }
}
@media (max-width: 480px) {
  .cal-layout { padding: 10px; gap: 8px; }
  .cal-header { padding: 10px 12px; }
  .cal-grid-container { padding: 6px; }
  .cal-month-cell { min-height: 50px; padding: 2px; }
  .cal-month-cell-day { font-size: 14px; }
  .cal-nav-btn { width: 48px; height: 48px; }
  .cal-today-btn { padding: 10px 14px; }
  .cal-view-tab { min-height: 48px; }
  .cal-modal { width: 95vw; }
}
</style>
</head>
<body>
<a href="#mainContent" class="skip-link">Skip to main content</a><div class="dashboard-layout">
  <main class="main-content" id="mainContent">
    <div class="cal-layout">
      <!-- Header -->
      <div class="cal-header" id="calendarHeader"></div>
      <!-- 4 compact KPI pills -->
      <div class="cal-kpi-bar" id="calendarKpiBar"></div>
      <!-- Calendar Grid — single calendar, full width -->
      <div class="cal-grid-container" id="calendarGrid"></div>
      <!-- Event List + New Event — below calendar -->
      <div class="cal-event-list" id="calendarEventList"></div>
      <div class="cal-new-event-area" id="calendarNewEventArea"></div>
      <!-- Polaris — shared polaris-card component from Dashboard -->
      <div class="cal-polaris-section ds-widget ds-widget-full" id="calendarPolaris"></div>
    </div>
  </main>
</div>
<div id="toast" class="toast"></div>
<script src="/js/demo-session.js"></script>
<script src="/js/polaris-api.js"></script>

<script src="/js/api.js"></script>

<script src="/js/business-models.js"></script>
<script src="/js/app-store.js"></script>

<script src="/js/notification-service.js"></script>

<script>
// Ensure AppStore has data — seed demo leads if empty (same as Dashboard)
(function ensureAppStoreData() {
  // Empty API/AppStore state is a valid fresh session. Do not manufacture
  // local leads that cannot reconcile with the canonical server graph.
  runInit();

  function runInit() {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCalendar);
    } else {
      initCalendar();
    }
  }
})();

function initCalendar() {
  window.calState.onChange(function() { window.calRenderer.render(); });
  window.refreshCalendar();
}
</script>
  <script src="/js/nav-component.js"></script>
  <script>NavComponent.init("calendar");</script>
</body>
