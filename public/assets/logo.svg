<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Gold gradient for star outline -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D46B"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#C89B2C"/>
      <stop offset="100%" stop-color="#A67C00"/>
    </linearGradient>

    <!-- Gold fill for north arrow -->
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2D46B"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Silver gradient for compass rose -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="25%" stop-color="#D9DDE2"/>
      <stop offset="50%" stop-color="#C9CDD2"/>
      <stop offset="75%" stop-color="#A0A8B0"/>
      <stop offset="100%" stop-color="#7D8793"/>
    </linearGradient>

    <!-- Silver dark for compass outlines -->
    <linearGradient id="silverDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0A8B0"/>
      <stop offset="50%" stop-color="#7D8793"/>
      <stop offset="100%" stop-color="#5A6570"/>
    </linearGradient>

    <!-- Navy dark -->
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- ===== GOLD VERSION (Primary) ===== -->
  <g id="gold-version">
    <!-- 5-point star outline - top point ~18% longer -->
    <path d="M 512 36 
             L 598 380 
             L 940 388 
             L 676 568 
             L 770 900 
             L 512 704 
             L 254 900 
             L 348 568 
             L 84 388 
             L 426 380 Z" 
          stroke="#D4AF37" stroke-width="24" stroke-linejoin="round" fill="none"/>

    <!-- Star highlight (thin inner stroke for depth) -->
    <path d="M 512 36 
             L 598 380 
             L 940 388 
             L 676 568 
             L 770 900 
             L 512 704 
             L 254 900 
             L 348 568 
             L 84 388 
             L 426 380 Z" 
          stroke="#F2D46B" stroke-width="6" stroke-linejoin="round" fill="none" opacity="0.4"/>

    <!-- Compass ring -->
    <circle cx="512" cy="512" r="160" stroke="url(#silverGrad)" stroke-width="20" fill="none"/>
    <circle cx="512" cy="512" r="148" stroke="url(#silverDark)" stroke-width="4" fill="none" opacity="0.3"/>

    <!-- Compass rose - 4-point -->
    <!-- North (filled gold) -->
    <path d="M 512 320 L 540 480 L 512 440 L 484 480 Z" fill="url(#goldFill)"/>
    
    <!-- South -->
    <path d="M 512 704 L 540 544 L 512 584 L 484 544 Z" fill="none" stroke="url(#silverDark)" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- East -->
    <path d="M 704 512 L 544 540 L 584 512 L 544 484 Z" fill="none" stroke="url(#silverDark)" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- West -->
    <path d="M 320 512 L 480 540 L 440 512 L 480 484 Z" fill="none" stroke="url(#silverDark)" stroke-width="12" stroke-linejoin="round"/>

    <!-- North arrow extension (extends upward through ring) -->
    <path d="M 512 280 L 532 460 L 512 420 L 492 460 Z" fill="url(#goldFill)"/>

    <!-- Directional tick marks -->
    <line x1="512" y1="330" x2="512" y2="350" stroke="url(#silverGrad)" stroke-width="8" stroke-linecap="round"/>
    <line x1="694" y1="512" x2="674" y2="512" stroke="url(#silverDark)" stroke-width="8" stroke-linecap="round"/>
    <line x1="512" y1="694" x2="512" y2="674" stroke="url(#silverDark)" stroke-width="8" stroke-linecap="round"/>
    <line x1="330" y1="512" x2="350" y2="512" stroke="url(#silverDark)" stroke-width="8" stroke-linecap="round"/>

    <!-- Compass hub -->
    <circle cx="512" cy="512" r="20" fill="url(#silverGrad)"/>
    <circle cx="512" cy="512" r="10" fill="url(#silverDark)"/>
  </g>

  <!-- ===== NAVY VERSION ===== -->
  <g id="navy-version" style="display:none;">
    <path d="M 512 36 L 598 380 L 940 388 L 676 568 L 770 900 L 512 704 L 254 900 L 348 568 L 84 388 L 426 380 Z" 
          stroke="#0F172A" stroke-width="24" stroke-linejoin="round" fill="none"/>
    <circle cx="512" cy="512" r="160" stroke="#0F172A" stroke-width="20" fill="none"/>
    <circle cx="512" cy="512" r="148" stroke="#475569" stroke-width="4" fill="none" opacity="0.3"/>
    <path d="M 512 320 L 540 480 L 512 440 L 484 480 Z" fill="#0F172A"/>
    <path d="M 512 704 L 540 544 L 512 584 L 484 544 Z" fill="none" stroke="#0F172A" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 704 512 L 544 540 L 584 512 L 544 484 Z" fill="none" stroke="#0F172A" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 320 512 L 480 540 L 440 512 L 480 484 Z" fill="none" stroke="#0F172A" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 512 280 L 532 460 L 512 420 L 492 460 Z" fill="#0F172A"/>
    <line x1="512" y1="330" x2="512" y2="350" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <line x1="694" y1="512" x2="674" y2="512" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <line x1="512" y1="694" x2="512" y2="674" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <line x1="330" y1="512" x2="350" y2="512" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
    <circle cx="512" cy="512" r="20" fill="#0F172A"/>
    <circle cx="512" cy="512" r="10" fill="#1E293B"/>
  </g>

  <!-- ===== WHITE VERSION ===== -->
  <g id="white-version" style="display:none;">
    <path d="M 512 36 L 598 380 L 940 388 L 676 568 L 770 900 L 512 704 L 254 900 L 348 568 L 84 388 L 426 380 Z" 
          stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round" fill="none"/>
    <circle cx="512" cy="512" r="160" stroke="#FFFFFF" stroke-width="20" fill="none"/>
    <circle cx="512" cy="512" r="148" stroke="#CBD5E1" stroke-width="4" fill="none" opacity="0.3"/>
    <path d="M 512 320 L 540 480 L 512 440 L 484 480 Z" fill="#FFFFFF"/>
    <path d="M 512 704 L 540 544 L 512 584 L 484 544 Z" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 704 512 L 544 540 L 584 512 L 544 484 Z" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 320 512 L 480 540 L 440 512 L 480 484 Z" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 512 280 L 532 460 L 512 420 L 492 460 Z" fill="#FFFFFF"/>
    <line x1="512" y1="330" x2="512" y2="350" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="694" y1="512" x2="674" y2="512" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="512" y1="694" x2="512" y2="674" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="330" y1="512" x2="350" y2="512" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <circle cx="512" cy="512" r="20" fill="#FFFFFF"/>
    <circle cx="512" cy="512" r="10" fill="#E2E8F0"/>
  </g>
</svg>