<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- ===== NAVY VERSION ===== -->
  <g id="navy">
    <!-- 5-point star outline (top point 15% longer) -->
    <path d="M 50 2 
             L 59.4 37.06 
             L 88.04 37.64 
             L 65.22 54.94 
             L 73.52 82.36 
             L 50 66 
             L 26.48 82.36 
             L 34.78 54.94 
             L 11.96 37.64 
             L 40.6 37.06 Z" 
          stroke="#0F172A" stroke-width="4" stroke-linejoin="round" fill="none"/>

    <!-- Compass ring -->
    <circle cx="50" cy="50" r="18" stroke="#0F172A" stroke-width="2.5" fill="none"/>

    <!-- Compass rose (4-point) -->
    <path d="M 50 30 L 54 46 L 66 50 L 54 54 L 50 70 L 46 54 L 34 50 L 46 46 Z" 
          stroke="#0F172A" stroke-width="1.5" stroke-linejoin="round" fill="none"/>

    <!-- North arrow (filled) -->
    <path d="M 50 28 L 54 46 L 50 42 L 46 46 Z" fill="#0F172A"/>

    <!-- Center dot -->
    <circle cx="50" cy="50" r="2" fill="#0F172A"/>
  </g>

