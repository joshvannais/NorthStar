<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — NorthStar AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/><circle cx="12" cy="10" r="2.5"/><path d="M12 6.5v3.5" stroke-width="2.5"/><path d="M10.5 8.5l1.5-2 1.5 2"/></svg>
        NorthStar
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/signup" class="btn btn-primary btn-sm">Start Free Trial</a>
      </div>
    </div>
  </nav>

  <main style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:24px 16px;">
    <div style="width:100%;max-width:400px;">
      <div style="text-align:center;margin-bottom:28px;">
        <h1 style="font-size:22px;font-weight:700;margin-bottom:4px;">Welcome back</h1>
        <p style="color:var(--neutral-500);font-size:14px;">Sign in to your account</p>
      </div>

      <form id="loginForm" style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
      </form>

      <!-- Demo Access Link -->
      <div style="margin-top:20px;padding:16px;background:#fef3c7;border-radius:8px;border:1px solid #fde68a;text-align:center;">
        <p style="font-size:14px;font-weight:600;color:#92400e;margin-bottom:8px;">🔑 Owner / Admin Access</p>
        <a href="/admin" style="display:inline-block;padding:8px 20px;background:var(--brand-600);color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">Go to Admin Panel</a>
        <p style="font-size:11px;color:#92400e;margin-top:8px;">View all contractors and platform settings.</p>
      </div>

      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--neutral-500);">
        Don't have an account? <a href="/signup" style="color:var(--brand-600);font-weight:600;text-decoration:none;">Create one</a>
      </p>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        // Demo fallback
        localStorage.setItem('user', JSON.stringify({ name: 'Demo Contractor', email, role: 'admin' }));
        window.location.href = '/dashboard';
      }
    });
  </script>
</body>
</html>
