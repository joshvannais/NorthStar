<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("northstar-theme")||"light")</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call History — NorthStar AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="/dashboard" class="sidebar-logo"><img src="/assets/logo.png" alt="NorthStar" class="logo-img"> NorthStar</a>
      <nav class="sidebar-nav">
        <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
        <a href="/dashboard/leads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Leads</span></a>
        <a href="/dashboard/calls" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>Call History</span></a>
        <a href="/dashboard/my-number"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>My Number</span></a>
        <a href="/dashboard/settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/></svg><span>Settings</span></a>
      </nav>
      <a href="/" onclick="localStorage.clear()" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);text-decoration:none;font-size:14px;font-weight:500;color:var(--neutral-500);margin-top:auto;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg><span>Sign Out</span></a>
      <button class="theme-toggle" onclick="NorthStarTheme.toggleTheme()" title="Toggle theme">&#127769;</button>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1>Call History</h1><p>Every call your AI receptionist has handled.</p></div>
        <button class="btn btn-primary btn-sm" onclick="simulateDemoCall()">&#128222; Simulate Call</button>
      </div>
      <div style="margin-bottom:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;" id="callStats">
        <div class="stat-card"><div class="stat-label">Total Calls</div><div class="stat-value" id="totalCalls">0</div></div>
        <div class="stat-card"><div class="stat-label">Avg Duration</div><div class="stat-value" id="avgDuration">—</div></div>
        <div class="stat-card"><div class="stat-label">Answer Rate</div><div class="stat-value" id="answerRate">—</div></div>
      </div>
      <div class="call-filters">
        <button class="call-filter-btn active" data-filter="all" onclick="setFilter('all')">All Calls</button>
        <button class="call-filter-btn" data-filter="answered" onclick="setFilter('answered')">Answered</button>
        <button class="call-filter-btn" data-filter="missed" onclick="setFilter('missed')">Missed</button>
        <button class="call-filter-btn" data-filter="voicemail" onclick="setFilter('voicemail')">Voicemail</button>
        <button class="call-filter-btn" data-filter="demo" onclick="setFilter('demo')">Demo</button>
        <button class="call-filter-btn" onclick="clearAllCalls()" style="margin-left:auto;border-color:var(--danger);color:var(--danger);">&#128465; Clear All</button>
      </div>
      <div id="callHistoryList"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><h3>No calls yet</h3><p>Click "Simulate Call" to see how calls appear here.</p></div></div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/js/api.js"></script>
<script>
var allCalls=[],currentFilter='all';
var firstNames=['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Barbara','William','Elizabeth','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Christopher','Karen','Charles','Lisa','Daniel','Nancy','Matthew','Betty','Anthony','Margaret','Mark','Sandra','Edward','Donna','Helen','Ruth','Paul','Sharon','Steve','Deborah','Brian','Carol','Kevin','Janet','Jason','Maria','George','Rachel','Ken','Heather','Frank','Diane','Raymond','Julie','Larry','Amanda','Scott','Mildred','Eric','Joan'];
var lastNames=['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','White','Harris','Clark','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Hill','Green','Adams','Baker','Hall','Rivera','Campbell'];
var streetNames=['Oak','Maple','Pine','Cedar','Birch','Elm','Walnut','Cherry','Willow','Ash','Spruce','Fir','Poplar','Hickory','Sycamore','Magnolia','Chestnut','Dogwood','Acacia','Juniper','Hemlock','Laurel','Hawthorne','Cypress','Cottonwood'];
var streetTypes=['St','Ave','Dr','Ln','Rd','Way','Ct','Pl','Blvd','Cir','Ter','Pkwy'];
var areaCodes=['401','203','518','607','315','845','914','631','516','212','347','917','646','718','860','203','413','603','802','207','978','508'];
var services=[
  {name:'Tree removal',rangeLow:400,rangeHigh:10000,scenarios:[
    {summary:'Large oak tree removal near house. Estimate scheduled.',transcript:"AI: NorthStar, how can I help?\nCustomer: I need a tree removed.\nAI: Name?\nCustomer: {name}\nAI: How tall is the tree?\nCustomer: About 50 feet.\nAI: I will schedule an estimator.",outcome:'appointment-set',status:'answered',dur:[180,420]},
    {summary:'Multiple dead trees need removal and stump grinding.',transcript:"AI: NorthStar, how can I help?\nCustomer: I have dead trees that need to come down.\nAI: Name?\nCustomer: {name}\nAI: Three trees? We can quote that.",outcome:'lead-captured',status:'answered',dur:[120,300]},
    {summary:'Tree fell on driveway after storm. Emergency.',transcript:"AI: NorthStar emergency line.\nCustomer: A tree fell on my driveway.\nAI: Name?\nCustomer: {name}\nAI: Sending someone right away.",outcome:'follow-up',status:'answered',dur:[60,180]}]},
  {name:'Emergency plumbing',rangeLow:200,rangeHigh:3500,scenarios:[
    {summary:'URGENT: Burst pipe under sink. Water everywhere.',transcript:"AI: NorthStar emergency.\nCustomer: Burst pipe! Water everywhere!\nAI: Name?\nCustomer: {name}\nAI: Shut off water. Dispatching plumber.",outcome:'follow-up',status:'answered',dur:[45,150]},
    {summary:'Water heater leaking. Needs replacement quote.',transcript:"AI: NorthStar, how can I help?\nCustomer: Water heater is leaking.\nAI: Name?\nCustomer: {name}\nAI: We can send someone tomorrow morning.",outcome:'appointment-set',status:'answered',dur:[180,360]},
    {summary:'Clogged main drain. Slow drains throughout house.',transcript:"AI: NorthStar, how can I help?\nCustomer: All my drains are slow.\nAI: Name?\nCustomer: {name}\nAI: Sounds like a main line issue.",outcome:'lead-captured',status:'answered',dur:[150,300]}]},
  {name:'Roof inspection',rangeLow:800,rangeHigh:12000,scenarios:[
    {summary:'Storm damage, missing shingles. Insurance estimate.',transcript:"AI: NorthStar.\nCustomer: Storm damaged my roof.\nAI: Name?\nCustomer: {name}\nAI: Missing shingles? We can inspect Wednesday.",outcome:'appointment-set',status:'answered',dur:[240,480]},
    {summary:'Leak in attic during rain. Needs repair.',transcript:"AI: NorthStar.\nCustomer: I have a leak in my attic.\nAI: Name?\nCustomer: {name}\nAI: We will tarp it today.",outcome:'follow-up',status:'answered',dur:[120,300]},
    {summary:'After hours voicemail about roof replacement.',transcript:"AI: You have reached NorthStar after hours.\nCustomer: Need roof replacement quote at {address}.",outcome:'follow-up',status:'voicemail',dur:[30,90]}]},
  {name:'Electrical panel upgrade',rangeLow:500,rangeHigh:4500,scenarios:[
    {summary:'Old fuse panel needs upgrade to breakers.',transcript:"AI: NorthStar.\nCustomer: Need panel upgrade.\nAI: Name?\nCustomer: {name}\nAI: When is good for an electrician?",outcome:'appointment-set',status:'answered',dur:[180,360]},
    {summary:'Breakers keep tripping. Needs inspection.',transcript:"AI: NorthStar.\nCustomer: Breakers keep tripping.\nAI: Name?\nCustomer: {name}\nAI: I will send an electrician.",outcome:'lead-captured',status:'answered',dur:[120,300]}]},
  {name:'Landscape design',rangeLow:300,rangeHigh:8000,scenarios:[
    {summary:'Front yard redesign with new plantings.',transcript:"AI: NorthStar.\nCustomer: Want to redo my front yard.\nAI: Name?\nCustomer: {name}\nAI: I will schedule a design consultation.",outcome:'appointment-set',status:'answered',dur:[240,480]},
    {summary:'Pricing inquiry for patio installation.',transcript:"AI: NorthStar.\nCustomer: How much for a patio?\nAI: Name?\nCustomer: {name}\nAI: We can give you a free estimate.",outcome:'no-interest',status:'missed',dur:[60,120]}]},
  {name:'HVAC repair',rangeLow:300,rangeHigh:6000,scenarios:[
    {summary:'AC not cooling. Needs service before weekend.',transcript:"AI: NorthStar.\nCustomer: AC stopped blowing cold air.\nAI: Name?\nCustomer: {name}\nAI: I will send a technician today.",outcome:'appointment-set',status:'answered',dur:[180,360]},
    {summary:'Furnace making loud banging noise.',transcript:"AI: NorthStar.\nCustomer: Furnace is making noise.\nAI: Name?\nCustomer: {name}\nAI: Let us get someone out there.",outcome:'lead-captured',status:'answered',dur:[150,300]}]},
  {name:'Gutter cleaning',rangeLow:100,rangeHigh:1500,scenarios:[
    {summary:'Seasonal gutter cleaning for two-story house.',transcript:"AI: NorthStar.\nCustomer: Need gutters cleaned.\nAI: Name?\nCustomer: {name}\nAI: We can do that. Free quote.",outcome:'appointment-set',status:'answered',dur:[120,240]}]},
  {name:'Pest control',rangeLow:100,rangeHigh:1000,scenarios:[
    {summary:'Ant infestation in kitchen. Needs treatment.',transcript:"AI: NorthStar.\nCustomer: Ants in my kitchen.\nAI: Name?\nCustomer: {name}\nAI: I will schedule an inspection.",outcome:'lead-captured',status:'answered',dur:[90,180]}]},
  {name:'Concrete driveway',rangeLow:800,rangeHigh:10000,scenarios:[
    {summary:'New driveway installation. Needs quote.',transcript:"AI: NorthStar.\nCustomer: Need a new driveway.\nAI: Name?\nCustomer: {name}\nAI: I will schedule a concrete specialist.",outcome:'appointment-set',status:'answered',dur:[180,360]}]},
  {name:'Fence installation',rangeLow:800,rangeHigh:7000,scenarios:[
    {summary:'Privacy fence for backyard. Quote needed.',transcript:"AI: NorthStar.\nCustomer: Need a privacy fence.\nAI: Name?\nCustomer: {name}\nAI: Wood or vinyl? I will send someone.",outcome:'appointment-set',status:'answered',dur:[180,360]}]},
  {name:'Window replacement',rangeLow:200,rangeHigh:4000,scenarios:[
    {summary:'Drafty windows. Replacement quote needed.',transcript:"AI: NorthStar.\nCustomer: My windows are drafty.\nAI: Name?\nCustomer: {name}\nAI: How many windows?\nCustomer: Six.\nAI: I will schedule a quote.",outcome:'appointment-set',status:'answered',dur:[180,360]}]},
  {name:'Carpet cleaning',rangeLow:80,rangeHigh:800,scenarios:[
    {summary:'Whole house carpet cleaning service.',transcript:"AI: NorthStar.\nCustomer: Need carpets cleaned.\nAI: Name?\nCustomer: {name}\nAI: How many rooms?\nCustomer: Four.\nAI: We can do that this week.",outcome:'appointment-set',status:'answered',dur:[90,180]}]},
  {name:'Pressure washing',rangeLow:100,rangeHigh:1200,scenarios:[
    {summary:'Driveway and house exterior pressure wash.',transcript:"AI: NorthStar.\nCustomer: Driveway needs pressure washing.\nAI: Name?\nCustomer: {name}\nAI: We can schedule that for you.",outcome:'appointment-set',status:'answered',dur:[60,150]}]}
];
var totalServices=services.length;
function generateCall(){
  var fn=firstNames[Math.floor(Math.random()*firstNames.length)];
  var ln=lastNames[Math.floor(Math.random()*lastNames.length)];
  var name=fn+' '+ln;
  var sn=streetNames[Math.floor(Math.random()*streetNames.length)];
  var st=streetTypes[Math.floor(Math.random()*streetTypes.length)];
  var num=Math.floor(Math.random()*8999)+100;
  var address=num+' '+sn+' '+st;
  var ac=areaCodes[Math.floor(Math.random()*areaCodes.length)];
  var phone='('+ac+') 555-'+(Math.floor(Math.random()*8999)+1000);
  var svc=services[Math.floor(Math.random()*totalServices)];
  var sc=svc.scenarios[Math.floor(Math.random()*svc.scenarios.length)];
  var durSec=Math.floor(Math.random()*(sc.dur[1]-sc.dur[0]))+sc.dur[0];
  var durMin=Math.floor(durSec/60);
  var durRem=durSec%60;
  var duration=durMin+':'+(durRem<10?'0':'')+durRem;
  var now=new Date();
  var daysAgo=Math.floor(Math.random()*5);
  var d=new Date(now);
  d.setDate(d.getDate()-daysAgo);
  var dayLabel=daysAgo===0?'Today':daysAgo===1?'Yesterday':daysAgo+' days ago';
  var hrs=Math.floor(Math.random()*12)+8;
  var mins=Math.floor(Math.random()*60);
  var ampm=hrs>=12?'PM':'AM';
  var time=dayLabel+', '+hrs+':'+(mins<10?'0':'')+mins+' '+ampm;
  var fullSvcName=svc.name;
  // Random price within the service's realistic range
  var jobPrice = Math.floor(Math.random() * (svc.rangeHigh - svc.rangeLow)) + svc.rangeLow;
  // Round to nearest 25 for realism
  jobPrice = Math.round(jobPrice / 25) * 25;
  var transcript=sc.transcript.replace(/{name}/g,name).replace(/{address}/g,address);
  var summary=sc.summary;
  return {caller:name,phone:phone,address:address,service:fullSvcName,avgPrice:jobPrice,priceRange:'$'+svc.rangeLow.toLocaleString()+'-$'+svc.rangeHigh.toLocaleString(),duration:duration,status:sc.status,outcome:sc.outcome,time:time,summary:summary,transcript:transcript};
}
function loadCalls(){var s=localStorage.getItem('northstar_calls');if(s){try{allCalls=JSON.parse(s)}catch(e){allCalls=[]}}renderCalls()}
function renderCalls(){
  var f=currentFilter==='all'?allCalls:allCalls.filter(function(c){return c.status===currentFilter});
  var el=document.getElementById('callHistoryList');
  if(f.length===0){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg><h3>No calls yet</h3><p>Click "Simulate Call" to see how calls appear here.</p></div>';updateStats();return}
  var html='';
  var outLabels={};
  outLabels['appointment-set']='Appointment Set';
  outLabels['lead-captured']='Lead Captured';
  outLabels['follow-up']='Follow-up Needed';
  outLabels['no-interest']='No Interest';
  for(var i=0;i<f.length;i++){
    var call=f[i];
    var inits=call.caller.split(' ').map(function(w){return w[0]}).join('').substring(0,2);
    var statusLabel=call.status.charAt(0).toUpperCase()+call.status.slice(1);
    var ol=outLabels[call.outcome]||call.outcome;
    var estHtml='';
    if(call.avgPrice){estHtml='<div class="call-est-value">Estimated job: <strong>$'+call.avgPrice.toLocaleString()+'</strong> <span style="font-size:11px;color:var(--neutral-500);">('+call.priceRange+')</span></div>'}
    var detailEstHtml='';
    if(call.avgPrice){detailEstHtml='<div class="call-detail-item" style="grid-column:1/-1;"><div class="call-detail-label">Estimated Job Value</div><div class="call-detail-value">$'+call.avgPrice.toLocaleString()+' <span style="font-size:12px;color:var(--neutral-500);">('+call.priceRange+')</span></div></div>'}
    html+='<div class="call-card" id="call-'+i+'"><div class="call-card-header" onclick="toggleCall('+i+')"><div class="call-caller"><div class="call-avatar">'+inits+'</div><div class="call-info"><div class="call-name">'+call.caller+'</div><div class="call-meta">'+call.time+' &middot; '+call.duration+' &middot; '+call.service+' <span class="call-outcome '+call.outcome+'">'+ol+'</span></div>'+estHtml+'</div></div><span class="call-status-badge '+call.status+'">'+statusLabel+'</span><svg class="call-expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="call-card-body"><div class="call-detail-grid"><div class="call-detail-item"><div class="call-detail-label">Phone</div><div class="call-detail-value">'+call.phone+'</div></div><div class="call-detail-item"><div class="call-detail-label">Address</div><div class="call-detail-value">'+call.address+'</div></div><div class="call-detail-item"><div class="call-detail-label">Service</div><div class="call-detail-value">'+call.service+'</div></div><div class="call-detail-item"><div class="call-detail-label">Duration</div><div class="call-detail-value">'+call.duration+'</div></div>'+detailEstHtml+'</div><div class="call-detail-label">&#128203; AI Summary</div><div class="call-summary">'+call.summary+'</div><div class="call-detail-label">&#128172; Transcript</div><div class="call-transcript">'+call.transcript+'</div><div class="call-actions"><button disabled style="opacity:0.5" title="Coming soon">&#127911; Play Recording</button><button onclick="showToast(\'SMS sent to '+call.phone+'\')">&#9993; Send SMS</button><button onclick="showToast(\'Email sent\')">&#9993; Send Email</button></div></div></div>'
  }
  el.innerHTML=html;updateStats()
}
function toggleCall(i){var cards=document.querySelectorAll('.call-card.expanded');for(var c=0;c<cards.length;c++){if(cards[c].id!=='call-'+i){cards[c].classList.remove('expanded')}}document.getElementById('call-'+i).classList.toggle('expanded')}
function setFilter(f){currentFilter=f;var btns=document.querySelectorAll('.call-filter-btn');for(var b=0;b<btns.length;b++){btns[b].classList.toggle('active',btns[b].dataset.filter===f)}renderCalls()}
function updateStats(){var t=allCalls.length;var a=0,m=0,ts=0;for(var i=0;i<t;i++){var c=allCalls[i];if(c.status==='answered')a++;if(c.status==='missed')m++;var p=c.duration.split(':');ts+=parseInt(p[0])*60+parseInt(p[1])}var am=t>0?Math.floor(ts/t/60):0;var as=t>0?Math.floor((ts/t)%60):0;var r=t>0?Math.round((a/t)*100):0;document.getElementById('totalCalls').textContent=t;document.getElementById('avgDuration').textContent=t>0?am+':'+(as<10?'0':'')+as:'—';document.getElementById('answerRate').textContent=t>0?r+'%':'—'}
function simulateDemoCall(){var call=generateCall();allCalls.unshift(call);localStorage.setItem('northstar_calls',JSON.stringify(allCalls));renderCalls();showToast('Call from '+call.caller+' - $'+call.avgPrice.toLocaleString()+' estimated job','success')}
function clearAllCalls(){if(confirm('Clear all call history?')){allCalls=[];localStorage.removeItem('northstar_calls');renderCalls();showToast('Calls cleared','')}}
function showToast(msg,t){var el=document.getElementById('toast');el.textContent=msg;el.className='toast show';setTimeout(function(){el.classList.remove('show')},3000)}
loadCalls();
</script>
</body>
</html>
